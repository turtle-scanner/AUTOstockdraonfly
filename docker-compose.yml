version: '3.8'

services:
  trading-bot:
    build: .
    container_name: bonde-trading-bot
    restart: always
    env_file: .env
    volumes:
      - .:/app
    command: python bonde_procedural_bot.py

  api-server:
    build: .
    container_name: bonde-api-server
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    command: python api_server.py

  telegram-bot:
    build: .
    container_name: bonde-telegram-bot
    restart: always
    env_file: .env
    volumes:
      - .:/app
    command: python v7_bonde_master_bot.py
